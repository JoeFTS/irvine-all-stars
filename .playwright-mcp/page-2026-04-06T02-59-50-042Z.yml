      - paragraph [ref=e267]: ★ For the Family
      - heading "What Parents Should Know" [level=2] [ref=e268]
      - paragraph [ref=e269]: All-Stars is a commitment for the whole family. Here's what to expect beyond the field.
      - generic [ref=e270]:
        - generic [ref=e271]:
          - img [ref=e273]
          - heading "Time Commitment" [level=3] [ref=e276]
          - paragraph [ref=e277]: Expect 3-4 practices per week plus weekend games and tournaments. The All-Stars season runs approximately 6-8 weeks through the summer. Full attendance is expected for all team activities.
        - generic [ref=e278]:
          - img [ref=e280]
          - heading "Estimated Costs" [level=3] [ref=e282]
          - paragraph [ref=e283]: All-Stars fees typically range from $200-$400 per player, covering tournament entry fees, uniforms, and umpire costs. Exact amounts vary by division and are communicated after roster selection.
        - generic [ref=e284]:
          - img [ref=e286]
          - heading "Communication" [level=3] [ref=e288]
          - paragraph [ref=e289]: Coaches will use team communication tools (typically TeamSnap or similar) for schedules, updates, and announcements. Parents are expected to be responsive and check for updates regularly.
        - generic [ref=e290]:
          - img [ref=e292]
          - heading "Parent Conduct" [level=3] [ref=e294]
          - paragraph [ref=e295]: We expect positive sideline behavior, respect for coaches and umpires, and support for all players — not just your own. Our program prioritizes sportsmanship from everyone involved.
