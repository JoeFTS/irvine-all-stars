      - paragraph [ref=e153]: ★ Game Day
      - heading "What to Expect at Tryouts" [level=2] [ref=e154]
      - paragraph [ref=e155]: Here's a walkthrough of tryout day so your player arrives confident and ready.
      - generic [ref=e156]:
        - generic [ref=e157]:
          - generic [ref=e158]: "1"
          - generic [ref=e159]:
            - heading "Check-In & Jersey Numbers" [level=3] [ref=e160]
            - paragraph [ref=e161]: Players check in at the registration table, receive a numbered jersey for identification, and are assigned to their evaluation group.
        - generic [ref=e162]:
          - generic [ref=e163]: "2"
          - generic [ref=e164]:
            - heading "Station Rotations" [level=3] [ref=e165]
            - paragraph [ref=e166]: Players rotate through hitting, fielding, throwing, and running stations. Each station is run by trained evaluators who score every player independently.
        - generic [ref=e167]:
          - generic [ref=e168]: "3"
          - generic [ref=e169]:
            - heading "Independent Evaluators" [level=3] [ref=e170]
            - paragraph [ref=e171]: All scoring is done by independent evaluators — not the coaches selecting rosters. This ensures every player gets a fair, unbiased assessment.
        - generic [ref=e172]:
          - generic [ref=e173]: "4"
          - generic [ref=e174]:
            - heading "Water Breaks & Duration" [level=3] [ref=e175]
            - paragraph [ref=e176]: Tryouts last approximately 2 hours with scheduled water breaks. Players should arrive 15 minutes early and be ready to play.
    - generic [ref=e178]:
      - paragraph [ref=e179]: ★ The Rubric
      - heading "How Players Are Scored" [level=2] [ref=e180]
      - paragraph [ref=e181]: Every player is evaluated on the same 54-point scale across 6 categories. No subjectivity, no shortcuts — just skills.
      - generic [ref=e182]:
        - generic [ref=e184]:
          - generic [ref=e185]: "9"
          - generic [ref=e186]:
            - heading "Hitting" [level=3] [ref=e187]
            - paragraph [ref=e188]: Swing mechanics, bat speed, contact consistency, and ability to drive the ball. Evaluated through live batting practice and tee work.
        - generic [ref=e190]:
          - generic [ref=e191]: "9"
          - generic [ref=e192]:
            - heading "Fielding" [level=3] [ref=e193]
            - paragraph [ref=e194]: Glove work, footwork, range, and ability to field ground balls and fly balls cleanly. Evaluated at multiple positions.
        - generic [ref=e196]:
          - generic [ref=e197]: "9"
          - generic [ref=e198]:
            - heading "Throwing" [level=3] [ref=e199]
            - paragraph [ref=e200]: Arm strength, accuracy, and proper throwing mechanics. Measured through distance throws and positional throwing drills.
        - generic [ref=e202]:
          - generic [ref=e203]: "9"
          - generic [ref=e204]:
            - heading "Running / Speed" [level=3] [ref=e205]
            - paragraph [ref=e206]: Base running speed, agility, and instincts. Timed sprints and base-to-base running evaluated.
        - generic [ref=e208]:
          - generic [ref=e209]: "9"
          - generic [ref=e210]:
            - heading "Effort" [level=3] [ref=e211]
            - paragraph [ref=e212]: Hustle, intensity, and willingness to give 100% throughout the tryout. Players who compete hard on every play stand out.
        - generic [ref=e214]:
          - generic [ref=e215]: "9"
          - generic [ref=e216]:
            - heading "Attitude" [level=3] [ref=e217]
            - paragraph [ref=e218]: Sportsmanship, coachability, and enthusiasm. How a player treats teammates, coaches, and the game matters.
