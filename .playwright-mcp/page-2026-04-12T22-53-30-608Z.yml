            - heading "Check-In & Jersey Numbers" [level=3] [ref=e157]
            - paragraph [ref=e158]: Players check in at the registration table, receive a numbered jersey for identification, and are assigned to their evaluation group.
        - generic [ref=e159]:
          - generic [ref=e160]: "2"
          - generic [ref=e161]:
            - heading "Station Rotations" [level=3] [ref=e162]
            - paragraph [ref=e163]: Players rotate through hitting, fielding, throwing, and running stations. Each station is run by trained evaluators who score every player independently.
        - generic [ref=e164]:
          - generic [ref=e165]: "3"
          - generic [ref=e166]:
            - heading "Independent Evaluators" [level=3] [ref=e167]
            - paragraph [ref=e168]: All scoring is done by independent evaluators — not the coaches selecting rosters. This ensures every player gets a fair, unbiased assessment.
        - generic [ref=e169]:
          - generic [ref=e170]: "4"
          - generic [ref=e171]:
            - heading "Water Breaks & Duration" [level=3] [ref=e172]
            - paragraph [ref=e173]: Tryouts last approximately 2 hours with scheduled water breaks. Players should arrive 15 minutes early and be ready to play.
