          - heading "Time Commitment" [level=3] [ref=e273]
          - paragraph [ref=e274]: Expect 3-4 practices per week plus weekend games and tournaments. The All-Stars season runs approximately 6-8 weeks through the summer. Full attendance is expected for all team activities.
        - generic [ref=e275]:
          - img [ref=e277]
          - heading "Estimated Costs" [level=3] [ref=e279]
          - paragraph [ref=e280]: All-Stars fees typically range from $200-$400 per player, covering tournament entry fees, uniforms, and umpire costs. Exact amounts vary by division and are communicated after roster selection.
        - generic [ref=e281]:
          - img [ref=e283]
          - heading "Communication" [level=3] [ref=e285]
          - paragraph [ref=e286]: Coaches will use team communication tools (typically TeamSnap or similar) for schedules, updates, and announcements. Parents are expected to be responsive and check for updates regularly.
        - generic [ref=e287]:
          - img [ref=e289]
          - heading "Parent Conduct" [level=3] [ref=e291]
          - paragraph [ref=e292]: We expect positive sideline behavior, respect for coaches and umpires, and support for all players — not just your own. Our program prioritizes sportsmanship from everyone involved.
