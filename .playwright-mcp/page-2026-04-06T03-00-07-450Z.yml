      - paragraph [ref=e15]: ★ Questions & Answers
      - heading "Frequently Asked Questions" [level=1] [ref=e16]
      - paragraph [ref=e17]: Everything you need to know about Irvine All-Stars — from tryouts and selection to coaching and costs.
    - generic [ref=e26]:
      - generic [ref=e27]:
        - heading "For Parents" [level=2] [ref=e28]
        - generic [ref=e29]:
          - generic [ref=e30]:
            - button "What is All-Stars?" [ref=e31]:
              - generic [ref=e32]: What is All-Stars?
              - img [ref=e33]
            - generic [ref=e35]: All-Stars are post-season tournament teams that represent Irvine Pony Baseball in inter-league competition. Players are selected from across the league to form the best possible team in each age division. It's a chance for standout players to compete at a higher level during the summer months.
          - generic [ref=e36]:
            - button "How are players selected?" [ref=e37]:
              - generic [ref=e38]: How are players selected?
              - img [ref=e39]
            - generic [ref=e41]: Every player who tries out is evaluated by independent evaluators using a standardized 54-point rubric. The rubric covers hitting, fielding, throwing, running/speed, effort, and attitude — each scored 1–9. Scores are combined with regular-season performance data to build balanced, competitive rosters. The process is designed to be fair, transparent, and free from politics.
          - generic [ref=e42]:
            - button "What is the time commitment?" [ref=e43]:
              - generic [ref=e44]: What is the time commitment?
              - img [ref=e45]
            - generic [ref=e47]: All-Stars is a significant commitment. Expect practices 2–4 times per week plus games and tournaments from late May through early August. Weeknight practices are typically 1.5–2 hours, and tournament weekends may involve multiple games per day. Families should be prepared for a busy summer schedule.
          - generic [ref=e48]:
            - button "What does it cost?" [ref=e49]:
              - generic [ref=e50]: What does it cost?
              - img [ref=e51]
            - generic [ref=e53]: Costs vary by division but typically include a uniform fee, tournament entry fees, and potential travel expenses for away tournaments. As a rough estimate, families should budget $200–$400 for the season. We're committed to being upfront about costs before rosters are finalized so there are no surprises.
          - generic [ref=e54]:
            - button "What if my child isn't selected?" [ref=e55]:
              - generic [ref=e56]: What if my child isn't selected?
              - img [ref=e57]
            - generic [ref=e59]: Not making the All-Stars roster is disappointing, but it's not the end of the road. We encourage players to keep developing their skills through summer camps, clinics, and fall ball. Coaches can provide feedback on areas for improvement. Many players who don't make it one year come back stronger the next.
          - generic [ref=e60]:
            - button "Can my child play on their regular season team too?" [ref=e61]:
              - generic [ref=e62]: Can my child play on their regular season team too?
              - img [ref=e63]
            - generic [ref=e65]: Yes. Regular season always takes priority until it ends. Once the regular season wraps up, players transition fully to their All-Stars team. If there are scheduling conflicts during the overlap period, regular-season games come first.
      - generic [ref=e66]:
        - heading "For Coaches" [level=2] [ref=e67]
        - generic [ref=e68]:
          - generic [ref=e69]:
            - button "How do I apply to coach?" [ref=e70]:
              - generic [ref=e71]: How do I apply to coach?
              - img [ref=e72]
            - generic [ref=e74]:
              - text: Coach applications are handled by invitation. To get started,
              - link "sign in" [ref=e75] [cursor=pointer]:
                - /url: /auth/login
              - text: to your account. You'll need to provide your coaching background, division preference, and availability.
          - generic [ref=e76]:
            - button "What's the coach selection process?" [ref=e77]:
              - generic [ref=e78]: What's the coach selection process?
              - img [ref=e79]
            - generic [ref=e81]: Coaches are evaluated on a 100-point rubric that includes coaching experience, baseball knowledge, communication skills, and commitment level. The selection committee conducts interviews, and final appointments are approved by the board. All head coaches must pass a background check before being confirmed.
          - generic [ref=e82]:
            - button "What's expected of a head coach?" [ref=e83]:
              - generic [ref=e84]: What's expected of a head coach?
              - img [ref=e85]
            - generic [ref=e87]: Head coaches are responsible for planning and running practices, managing games and tournament play, communicating regularly with parents, and handling administrative tasks like roster paperwork and tournament registration. It's a rewarding but demanding role that requires strong leadership and organization.
          - generic [ref=e88]:
            - button "Can I have assistant coaches?" [ref=e89]:
              - generic [ref=e90]: Can I have assistant coaches?
              - img [ref=e91]
            - generic [ref=e93]: Yes. Each head coach may have up to 3 assistant coaches on their staff. All assistant coaches must complete a background check and be approved by the coordinator before participating in any team activities.
